<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My dating profile- let's connect</title>
    <style>
        /* --- VARIABEL WARNA (TEMA PINK/ROSE) --- */
        :root {
            --bg-overlay: rgba(252, 228, 236, 0.85); /* Warna overlay pink transparan */
            --primary-color: #D81B60; 
            --hover-color: #AD1457;
            --text-main: #333;
            --text-sec: #777;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: transparent;
            color: var(--text-main);
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* --- BACKGROUND BLUR CONTAINER --- */
        .bg-blur-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(30px);
            z-index: -2;
            transform: scale(1.1);
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-overlay);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 450px;
            z-index: 1;
        }

        /* --- HEADER PROFILE --- */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .profile-pic-wrapper {
            width: 140px;
            height: 140px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: visible; 
            cursor: pointer;
            position: relative;
            background: #fff;
            
            /* ANIMASI FLOATING (Melayang) */
            animation: floatProfile 3s ease-in-out infinite;
            
            transition: border-color 0.3s ease, transform 0.2s ease;
        }

        .profile-pic-wrapper:hover {
            border-color: var(--primary-color);
            animation-play-state: paused; 
            transform: scale(1.1);
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            pointer-events: none;
            display: block;
        }

        /* --- BADGE LOVE EMOT DI POJOK --- */
        .love-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 18px;
            z-index: 10;
            animation: beatHeart 1.5s infinite;
        }

        /* KEYFRAMES ANIMASI */
        @keyframes floatProfile {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes beatHeart {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 5px;
            color: var(--text-main);
            text-shadow: 0 1px 3px rgba(255,255,255,0.8);
        }

        .subtitle {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sec);
            font-weight: 600;
        }

        /* --- CARDS STYLE --- */
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card h2 {
            font-size: 1rem;
            color: var(--text-main);
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        /* --- ABOUT ME --- */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            background: #f8bbd0;
            color: #880e4f;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* --- CONNECT LIST --- */
        .connect-list {
            list-style: none;
        }

        .connect-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            font-weight: 500;
            transition: color 0.2s, padding-left 0.2s;
        }

        .connect-item:last-child { border-bottom: none; }
        
        .connect-item:hover {
            color: var(--primary-color);
            padding-left: 5px;
        }
        .connect-item span { font-size: 1.2rem; }

        /* --- IDEAL DATE --- */
        .date-quote {
            font-style: italic;
            font-size: 0.95rem;
            color: #555;
            line-height: 1.5;
        }

        /* --- BUTTON --- */
        .main-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.4);
            transition: background 0.3s, transform 0.2s;
        }
        .main-btn:hover {
            background-color: var(--hover-color);
            transform: translateY(-2px);
        }
        
        .copyright { 
            text-align: center; 
            font-size: 0.75rem; 
            color: #666;
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>

    <!-- Background Blur -->
    <div id="bgBlur" class="bg-blur-container"></div>
    <div class="bg-overlay"></div>

    <div class="container">
        <!-- Header Profile -->
        <div class="header">
            <!-- Foto Klik Redirect -->
            <div class="profile-pic-wrapper" onclick="redirectUser()">
                <img id="randomProfileImg" src="" alt="Profile" class="profile-pic">
                
                <!-- Badge Emot Love di Pojok -->
                <div class="love-badge">❤️</div>
            </div>
            
            <!-- NAMA RANDOM (JS akan mengganti isi id="userName") -->
            <h1>Hi, I'm <span id="userName">Amber</span>!</h1>
            
            <div class="subtitle">COFFEE LOVER · TRAVELER · DOG PARENT</div>
        </div>

        <!-- Card 1: About Me -->
        <div class="card">
            <h2>About Me</h2>
            <div class="tags-container">
                <span class="tag">INTJ</span>
                <span class="tag">Sushi Addict</span>
                <span class="tag">Netflix Binger</span>
                <span class="tag">Beach Lover</span>
            </div>
        </div>

        <!-- Card 2: Connect With Me -->
        <div class="card">
            <h2>Connect With Me</h2>
            <div class="connect-list">
                <div class="connect-item" onclick="redirectUser()">
                    My Daily Life <span>➜</span>
                </div>
                <div class="connect-item" onclick="redirectUser()">
                    Call Me <span>📞</span>
                </div>
                <div class="connect-item" onclick="redirectUser()">
                    Slide into my DMs <span>💬</span>
                </div>
            </div>
        </div>

        <!-- Card 3: Ideal First Date -->
        <div class="card">
            <h2>Ideal First Date</h2>
            <p class="date-quote">
                "Sunset at beach followed by late night tacos"
            </p>
        </div>

        <!-- Main CTA Button -->
        <button class="main-btn" onclick="redirectUser()">
            Send Some Love ❤️
        </button>

        <div class="copyright">My Dating Profile</div>
    </div>

    <!-- Script Logic -->
    <script>
        // --- 1. DATABASE GAMBAR ---
        const photoList = [
            "https://files.catbox.moe/p9uwso.png",
            "https://files.catbox.moe/0s5wni.png",
            "https://files.catbox.moe/2hg2st.png",
            "https://files.catbox.moe/i4bygx.png",
            "https://files.catbox.moe/tebpm0.png",
            "https://files.catbox.moe/ghpyfa.png",
            "https://files.catbox.moe/5rj761.jpg",
            "https://files.catbox.moe/2kj1da.png",
            "https://files.catbox.moe/7k81uw.png",
            "https://files.catbox.moe/07pxbl.png"
        ];

        // --- 2. DATABASE NAMA (BARU) ---
        const femaleNames = [
            "Amber", "Grace", "Sophia", "Charlotte", "Victoria", 
            "Camille", "Elise", "Audrey", "Natalie", "Isabella", 
            "Eleanor", "Scarlett", "Penelope", "Emma", "Olivia"
        ];

        // Fungsi ambil gambar acak
        function getRandomImage(list) {
            return list[Math.floor(Math.random() * list.length)];
        }

        document.addEventListener('DOMContentLoaded', () => {
            // --- SET FOTO PROFIL ---
            const profileImg = getRandomImage(photoList);
            document.getElementById('randomProfileImg').src = profileImg;

            // --- SET BACKGROUND (Berbeda dari profil) ---
            let bgImg = getRandomImage(photoList);
            while(bgImg === profileImg) {
                bgImg = getRandomImage(photoList); // Loop sampai ketemu gambar beda
            }
            document.getElementById('bgBlur').style.backgroundImage = `url('${bgImg}')`;

            // --- SET NAMA RANDOM ---
            const randomName = femaleNames[Math.floor(Math.random() * femaleNames.length)];
            document.getElementById('userName').textContent = randomName;
        });

        // --- 3. Redirect Logic ---
        function redirectUser() {
            const params = new URLSearchParams(window.location.search);
            const destination = params.get('dest');
            const refId = params.get('id');

            if (destination) {
                const finalDest = decodeURIComponent(destination);
                const separator = finalDest.includes('?') ? '&' : '?';
                window.location.href = finalDest + separator + 'id=' + refId;
            } else {
                alert("Link tujuan tidak ditemukan.");
            }
        }
    </script>
</body>
</html>
